<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    V1: "Silhouette Trio" — tweak of #4 (head+asterisk) + #10 (dual face)
    Three overlapping head profiles facing left, stroke only.
    Front head has subtle neural mesh in cranium. Luxurious, classic.
  -->
  <g stroke-linecap="round" stroke-linejoin="round">

    <!-- Head 1 (back) — lightest, offset left -->
    <path d="
      M 200,100
      C 230,90 265,95 290,115
      C 315,135 330,170 335,210
      C 340,250 330,290 310,320
      C 295,342 278,355 260,360
      C 250,363 242,372 238,385
      C 234,400 228,410 218,415
      C 205,422 192,418 185,408
      C 178,398 175,385 175,372
      C 175,362 170,352 162,345
      C 152,338 145,326 145,310
      C 145,292 150,272 160,252
      C 168,235 172,218 172,200
      C 172,178 178,158 190,140
      C 198,125 200,112 200,100 Z
    " stroke="#FFFFFF" stroke-width="1.2" opacity="0.3"/>

    <!-- Head 2 (middle) — medium, centered -->
    <path d="
      M 220,88
      C 250,78 285,83 310,103
      C 335,123 350,158 355,198
      C 360,238 350,278 330,308
      C 315,330 298,343 280,348
      C 270,351 262,360 258,373
      C 254,388 248,398 238,403
      C 225,410 212,406 205,396
      C 198,386 195,373 195,360
      C 195,350 190,340 182,333
      C 172,326 165,314 165,298
      C 165,280 170,260 180,240
      C 188,223 192,206 192,188
      C 192,166 198,146 210,128
      C 218,113 220,100 220,88 Z
    " stroke="#FFFFFF" stroke-width="1.2" opacity="0.55"/>

    <!-- Head 3 (front) — boldest, full neural mesh -->
    <path d="
      M 240,76
      C 270,66 305,71 330,91
      C 355,111 370,146 375,186
      C 380,226 370,266 350,296
      C 335,318 318,331 300,336
      C 290,339 282,348 278,361
      C 274,376 268,386 258,391
      C 245,398 232,394 225,384
      C 218,374 215,361 215,348
      C 215,338 210,328 202,321
      C 192,314 185,302 185,286
      C 185,268 190,248 200,228
      C 208,211 212,194 212,176
      C 212,154 218,134 230,116
      C 238,101 240,88 240,76 Z
    " stroke="#FFFFFF" stroke-width="1.2" opacity="1"/>

    <!-- Neural mesh inside Head 3 cranium -->
    <g stroke="#FFFFFF" stroke-width="0.8" opacity="0.6">
      <!-- Mesh connections -->
      <path d="M 280,95 L 310,130 M 310,130 L 350,155 M 280,95 L 260,130"/>
      <path d="M 260,130 L 310,130 M 310,130 L 345,180 M 260,130 L 240,170"/>
      <path d="M 240,170 L 290,165 M 290,165 L 345,180 M 240,170 L 225,210"/>
      <path d="M 225,210 L 280,200 M 280,200 L 340,210 M 290,165 L 280,200"/>
      <path d="M 280,200 L 310,240 M 225,210 L 260,245 M 260,245 L 310,240"/>
      <path d="M 260,130 L 290,165 M 310,130 L 290,165"/>
      <path d="M 345,180 L 340,210 M 340,210 L 330,245"/>
    </g>

    <!-- Neural nodes (teal accent) -->
    <g fill="#00d4aa">
      <circle cx="280" cy="95" r="3"/>
      <circle cx="310" cy="130" r="3.5"/>
      <circle cx="260" cy="130" r="2.5"/>
      <circle cx="350" cy="155" r="2.5"/>
      <circle cx="290" cy="165" r="4"/>
      <circle cx="240" cy="170" r="2.5"/>
      <circle cx="345" cy="180" r="2.5"/>
      <circle cx="280" cy="200" r="3.5"/>
      <circle cx="225" cy="210" r="2.5"/>
      <circle cx="340" cy="210" r="2.5"/>
      <circle cx="260" cy="245" r="2.5"/>
      <circle cx="310" cy="240" r="3"/>
    </g>
  </g>
</svg>
