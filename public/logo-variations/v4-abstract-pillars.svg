<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    V4: "Abstract Pillars" — Architectural Trinity
    Three vertical pillar forms of varying heights suggest human figures.
    Rounded tops flow into gentle S-curved verticals. Connected at base
    by a shared platform. Monumental, minimal — museum / foundation mark.
    No neural mesh. Single teal accent on center pillar crown.
  -->

  <!-- Shared base platform -->
  <line
    x1="128" y1="390" x2="384" y2="390"
    stroke="#FFFFFF" stroke-width="0.8" stroke-linecap="round"
    opacity="0.4"
  />

  <!-- Left pillar — shortest (height ~200) -->
  <g stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" fill="none">
    <!--
      Rounded head cap: a small arc at the top suggesting a head,
      flowing into the vertical stroke with a gentle S-curve.
    -->
    <path d="
      M 182,190
      C 182,178 190,170 198,170
      C 206,170 214,178 214,190
    " opacity="0.85"/>
    <!-- Left pillar body — gentle S-curve -->
    <path d="
      M 182,190
      C 180,220 176,255 178,290
      C 180,325 184,358 186,390
    " opacity="0.85"/>
    <path d="
      M 214,190
      C 216,220 220,255 218,290
      C 216,325 212,358 210,390
    " opacity="0.85"/>
  </g>

  <!-- Center pillar — tallest (height ~280), dominant -->
  <g stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" fill="none">
    <!-- Rounded head cap -->
    <path d="
      M 240,110
      C 240,96 248,86 256,86
      C 264,86 272,96 272,110
    " opacity="1"/>
    <!-- Center pillar body — gentle S-curve, slight sway -->
    <path d="
      M 240,110
      C 237,150 234,200 236,255
      C 238,310 242,355 244,390
    " opacity="1"/>
    <path d="
      M 272,110
      C 275,150 278,200 276,255
      C 274,310 270,355 268,390
    " opacity="1"/>
  </g>

  <!-- Right pillar — medium height (~240) -->
  <g stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" fill="none">
    <!-- Rounded head cap -->
    <path d="
      M 298,150
      C 298,137 306,128 314,128
      C 322,128 330,137 330,150
    " opacity="0.7"/>
    <!-- Right pillar body — gentle S-curve -->
    <path d="
      M 298,150
      C 296,185 300,225 302,268
      C 304,310 306,355 308,390
    " opacity="0.7"/>
    <path d="
      M 330,150
      C 332,185 328,225 326,268
      C 324,310 322,355 320,390
    " opacity="0.7"/>
  </g>

  <!-- Base connection marks — subtle feet/anchors on the platform -->
  <g stroke="#FFFFFF" stroke-width="0.8" stroke-linecap="round" opacity="0.3">
    <line x1="183" y1="390" x2="213" y2="390"/>
    <line x1="241" y1="390" x2="271" y2="390"/>
    <line x1="305" y1="390" x2="323" y2="390"/>
  </g>

  <!-- Teal accent — crown dot on center (tallest) pillar -->
  <circle cx="256" cy="86" r="4" fill="#00d4aa"/>
</svg>
