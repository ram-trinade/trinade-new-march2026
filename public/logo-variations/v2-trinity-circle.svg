<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    V2: "Trinity Circle"
    Three abstract human figures at 120° intervals, facing inward
    toward a shared center. Connected by subtle arcs forming a
    circular bond. Teal convergence dot at center.
    Premium, balanced, consulting-firm aesthetic.
  -->

  <defs>
    <!-- Reusable figure: head + neck + shoulders + torso taper -->
    <g id="figure">
      <circle cx="256" cy="126" r="18" stroke-width="1.4"/>
      <line x1="256" y1="144" x2="256" y2="160" stroke-width="1.4"/>
      <path d="M 224,166 Q 240,158 256,160 Q 272,158 288,166" stroke-width="1.3"/>
      <path d="M 228,170 Q 236,192 246,206" stroke-width="1.2" opacity="0.55"/>
      <path d="M 284,170 Q 276,192 266,206" stroke-width="1.2" opacity="0.55"/>
    </g>
  </defs>

  <g stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Figure 1 — Top, facing down -->
    <use href="#figure"/>

    <!-- Figure 2 — Bottom-right, facing upper-left -->
    <use href="#figure" transform="rotate(120, 256, 256)"/>

    <!-- Figure 3 — Bottom-left, facing upper-right -->
    <use href="#figure" transform="rotate(240, 256, 256)"/>

    <!--
      Connecting arcs — three curved strokes forming a
      circular rhythm between figures. Each arc sweeps
      from one figure's torso base to the next.

      Torso base of top figure: ~(256, 208)
      Relative to center (256,256): (0, -48)
      Rotated 120°: (41.6, 24)  => absolute (297.6, 280)
      Rotated 240°: (-41.6, 24) => absolute (214.4, 280)
    -->

    <!-- Arc: top to bottom-right (curves outward right) -->
    <path d="M 264,208 C 310,224 322,258 298,280"
      stroke-width="0.9" opacity="0.28"/>

    <!-- Arc: bottom-right to bottom-left (curves outward below) -->
    <path d="M 298,282 C 284,318 228,318 214,282"
      stroke-width="0.9" opacity="0.28"/>

    <!-- Arc: bottom-left to top (curves outward left) -->
    <path d="M 214,280 C 190,258 202,224 248,208"
      stroke-width="0.9" opacity="0.28"/>

    <!-- Subtle inner ring — implied circular unity -->
    <circle cx="256" cy="256" r="38" stroke-width="0.4" opacity="0.1"/>

  </g>

  <!-- Center convergence — teal accent -->
  <circle cx="256" cy="256" r="4.5" fill="#00d4aa"/>

</svg>
