<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    V3: "Overlapping Silhouettes"
    Three head+shoulder silhouettes, overlapping left-to-right.
    Each figure = circle (head) + shoulder-neck-shoulder curve.
    Shoulder path: gentle outer slopes, steep narrow neck, smooth continuity.
    Opacity: back 0.3, mid 0.6, front 1.0.
    Stroke-width: back 0.8, mid 1.0, front 1.5.
    ~72px horizontal offset — cards fanning out to the right.
    Centered in 512x512. Editorial, sophisticated, premium.
    No neural mesh. Single teal dot at leading figure's shoulder.
    Works at 32px favicon.
  -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!--
      ═══ Figure 1 (back, leftmost) — 0.3 opacity, 0.8 stroke ═══
      Head cx=184, cy=150, r=44
      Neck top ~y=218 (head bottom at ~y=194, gap=24 for neck)
    -->
    <g opacity="0.3" stroke="#FFFFFF" stroke-width="0.8">
      <circle cx="184" cy="150" r="44"/>
      <!-- Shoulder path: left tip → slope → steep neck left → neck top →
           steep neck right → slope → right tip.
           All X values increase monotonically: 54→130→166→184→202→238→314 -->
      <path d="
        M 54,378
        C 74,364 104,344 130,326
        C 152,310 166,290 172,264
        C 176,248 178,228 182,218
        C 186,218 188,228 192,248
        C 196,264 202,290 238,326
        C 264,344 294,364 314,378
      "/>
    </g>

    <!--
      ═══ Figure 2 (middle) — 0.6 opacity, 1.0 stroke ═══
      Head cx=256, cy=144, r=44
    -->
    <g opacity="0.6" stroke="#FFFFFF" stroke-width="1.0">
      <circle cx="256" cy="144" r="44"/>
      <path d="
        M 126,372
        C 146,358 176,338 202,320
        C 224,304 238,284 244,260
        C 248,244 252,228 256,212
        C 260,228 264,244 268,260
        C 274,284 288,304 310,320
        C 336,338 366,358 386,372
      "/>
    </g>

    <!--
      ═══ Figure 3 (front, leading) — 1.0 opacity, 1.5 stroke ═══
      Head cx=330, cy=138, r=46 (slightly larger for hierarchy)
    -->
    <g opacity="1" stroke="#FFFFFF" stroke-width="1.5">
      <circle cx="330" cy="138" r="46"/>
      <path d="
        M 198,366
        C 218,352 248,332 274,314
        C 296,298 310,278 316,254
        C 320,238 324,222 328,206
        C 332,222 336,238 340,254
        C 346,278 360,298 382,314
        C 408,332 438,352 458,366
      "/>
    </g>

  </g>

  <!-- ═══ Teal accent — small dot on leading figure's right shoulder ═══ -->
  <circle cx="408" cy="332" r="4.5" fill="#00d4aa"/>

</svg>