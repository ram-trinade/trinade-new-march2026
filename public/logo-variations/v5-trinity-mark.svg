<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    V5: "The Trinity Mark" — ORIGINAL concept
    Bold, geometric: Single head silhouette facing left.
    Inside the cranium, three overlapping circles form a Venn diagram.
    Lines connect circle centers = trinity triangle.
    Teal dot at centroid. Iconic, works at any size.
  -->
  <g stroke-linecap="round" stroke-linejoin="round">

    <!-- Head silhouette — bold outline -->
    <path d="
      M 248,68
      C 280,58 320,66 350,92
      C 378,118 396,158 398,204
      C 400,250 388,294 366,328
      C 348,354 326,370 302,378
      C 290,382 280,394 276,410
      C 270,428 260,440 246,446
      C 228,454 210,448 202,434
      C 194,420 190,404 190,386
      C 190,374 184,362 174,354
      C 160,342 152,326 152,306
      C 152,282 160,258 172,236
      C 182,216 188,194 188,172
      C 188,144 196,120 214,100
      C 228,84 244,72 248,68 Z
    " stroke="#FFFFFF" stroke-width="1.5" fill="none"/>

    <!-- Three overlapping circles (Venn) inside cranium -->
    <!-- Arranged in a triangle: top, bottom-left, bottom-right -->
    <circle cx="290" cy="155" r="42" stroke="#FFFFFF" stroke-width="0.9" opacity="0.5"/>
    <circle cx="265" cy="200" r="42" stroke="#FFFFFF" stroke-width="0.9" opacity="0.5"/>
    <circle cx="315" cy="200" r="42" stroke="#FFFFFF" stroke-width="0.9" opacity="0.5"/>

    <!-- Trinity triangle connecting circle centers -->
    <path d="M 290,155 L 265,200 L 315,200 Z" stroke="#FFFFFF" stroke-width="0.7" opacity="0.35"/>

    <!-- Neural lines radiating from centroid -->
    <g stroke="#FFFFFF" stroke-width="0.5" opacity="0.3">
      <line x1="290" y1="185" x2="290" y2="130"/>
      <line x1="290" y1="185" x2="245" y2="220"/>
      <line x1="290" y1="185" x2="335" y2="220"/>
      <line x1="290" y1="185" x2="230" y2="170"/>
      <line x1="290" y1="185" x2="350" y2="170"/>
      <line x1="290" y1="185" x2="290" y2="240"/>
    </g>
  </g>

  <!-- Circle center nodes -->
  <circle cx="290" cy="155" r="3" fill="#FFFFFF"/>
  <circle cx="265" cy="200" r="3" fill="#FFFFFF"/>
  <circle cx="315" cy="200" r="3" fill="#FFFFFF"/>

  <!-- Outer radiation nodes -->
  <circle cx="290" cy="130" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="245" cy="220" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="335" cy="220" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="230" cy="170" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="350" cy="170" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="290" cy="240" r="2" fill="#FFFFFF" opacity="0.5"/>

  <!-- Centroid — teal accent -->
  <circle cx="290" cy="185" r="5" fill="#00d4aa"/>
</svg>
